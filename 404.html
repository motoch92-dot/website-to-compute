<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ลองกดดูสิ๊</title>
  <style>
    body {
      background-color: #ffe6f0;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }

    a {
      text-decoration: none;
    }

    button {
      background-color: #ff99cc;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #ff66b2;
    }
  </style>
</head>
<body>
  <a href="h2.html">
    <button>กดตรงนี้</button>
  </a>
</body>
</html>
